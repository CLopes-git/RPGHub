<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPGHub - Dashboard</title>
  <link rel="stylesheet" href="./dashboard.css">
</head>
<body>

<header class="topbar">
  <div class="menu">☰</div>
  <h1>RPGHub</h1>
  <div class="user">Aventureiro</div>
</header>

<section class="title">
  <h2>Suas Fichas</h2>
</section>

<main class="dashboard">

  <section class="cards" id="cards-container"></section>

  <section class="bottom-area">

    <div class="summary">
      <h3>Resumo</h3>
      <p>Fichas criadas: <strong><span id="total">0</span></strong></p>
      <p>Nível médio: <strong><span id="media">—</span></strong></p>
    </div>

    <div class="create-card">
      <div class="new-label">+</div>
      <h3>Nova Ficha</h3>
      <p>Crie um novo personagem de D&amp;D</p>
      <button onclick="abrirModal()">Criar Personagem</button>
    </div>

  </section>

</main>

<!-- ===== MODAL CRIAR PERSONAGEM ===== -->
<div id="modal-criar" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h3>Novo Personagem</h3>
      <button class="btn-fechar" onclick="fecharModal()">✕</button>
    </div>

    <form id="form-nova-ficha" class="modal-form">

      <div class="form-row">
        <div class="form-field form-field--wide">
          <label>Nome do Personagem *</label>
          <input type="text" id="new-nome" placeholder="Ex: Thorin Escudo-de-Pedra" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Classe *</label>
          <select id="new-classe" required>
            <option value="">Selecione...</option>
            <option>Bárbaro</option>
            <option>Bardo</option>
            <option>Clérigo</option>
            <option>Druida</option>
            <option>Feiticeiro</option>
            <option>Guerreiro</option>
            <option>Ladino</option>
            <option>Mago</option>
            <option>Monge</option>
            <option>Paladino</option>
            <option>Patrulheiro</option>
            <option>Warlock</option>
          </select>
        </div>
        <div class="form-field form-field--small">
          <label>Nível</label>
          <input type="number" id="new-nivel" value="1" min="1" max="20">
        </div>
      </div>

      <div class="form-row">
        <div class="form-field">
          <label>Raça *</label>
          <select id="new-raca" required>
            <option value="">Selecione...</option>
            <option>Anão</option>
            <option>Draconato</option>
            <option>Elfo</option>
            <option>Gnomo</option>
            <option>Halfling</option>
            <option>Humano</option>
            <option>Meio-Elfo</option>
            <option>Meio-Orc</option>
            <option>Tiefling</option>
          </select>
        </div>
        <div class="form-field">
          <label>Antecedente</label>
          <select id="new-antecedente">
            <option value="">Selecione...</option>
            <option>Acólito</option>
            <option>Artesão de Guilda</option>
            <option>Charlatão</option>
            <option>Criminoso</option>
            <option>Eremita</option>
            <option>Forasteiro</option>
            <option>Herói do Povo</option>
            <option>Marinheiro</option>
            <option>Nobre</option>
            <option>Órfão</option>
            <option>Sábio</option>
            <option>Soldado</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-field form-field--wide">
          <label>Alinhamento</label>
          <select id="new-alinhamento">
            <option value="">Selecione...</option>
            <option>Leal Bom</option>
            <option>Neutro Bom</option>
            <option>Caótico Bom</option>
            <option>Leal Neutro</option>
            <option>Neutro</option>
            <option>Caótico Neutro</option>
            <option>Leal Mau</option>
            <option>Neutro Mau</option>
            <option>Caótico Mau</option>
          </select>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" onclick="fecharModal()" class="btn-cancelar">Cancelar</button>
        <button type="submit" class="btn-confirmar">Criar e Editar Ficha →</button>
      </div>

    </form>
  </div>
</div>

<script src="./dashboard.js"></script>
</body>
</html>
